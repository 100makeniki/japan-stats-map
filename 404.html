<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var l = window.location;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?p=' + l.pathname.slice(1).split('/').join('/') + (l.search ? '&q=' + l.search.slice(1).split('&').join('&') : '') + l.hash);
  </script>
</head>
</html>
